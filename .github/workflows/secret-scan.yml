name: secret-scan

on:
  push:
    branches: [main] # feature branches are covered by their PRs (avoids duplicate runs)
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so historical commits are scanned too
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # required by gitleaks-action to scan PR commits
          GITLEAKS_CONFIG: .gitleaks.toml

  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
