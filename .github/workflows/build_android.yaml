name: Build Android APK

# No trigger-level `paths:` filter, deliberately. "Build Android APK" and "JVM unit tests"
# are REQUIRED status checks on main, and the two documented ways to reconcile that with
# path filtering both failed here:
#   - workflow-level paths filter: docs-only PRs produce NO check runs → auto-merge deadlocks
#     on "Expected" (hit on PR #92).
#   - paths-ignore no-op twin (PR #93): on a MIXED PR both workflows run under the same check
#     names, and auto-merge fires on whichever goes green FIRST — the 3-second no-op gated a
#     full Android change before the real build finished (hit on PR #126; build passed post-hoc).
# So: this workflow always runs, a cheap `changes` job diffs the event base, and the heavy
# jobs are skipped via job-level `if` when nothing under Android/** changed. A skipped job
# reports one `skipped` check run per name — which satisfies branch protection — and there is
# never a duplicate check name for auto-merge to race.

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  changes:
    name: Detect Android changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Diff changed paths against the event base
        id: filter
        # Unknown base (forced push, branch creation) and workflow_dispatch fail toward
        # android=true — the safe direction is an unnecessary build, never a skipped gate.
        run: |
          case "${{ github.event_name }}" in
            pull_request) BASE="${{ github.event.pull_request.base.sha }}" ;;
            push)         BASE="${{ github.event.before }}" ;;
            *)            echo "android=true" >> "$GITHUB_OUTPUT"; exit 0 ;;
          esac
          if ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "android=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if git diff --name-only "$BASE" "${{ github.sha }}" | grep -q '^Android/'; then
            echo "android=true" >> "$GITHUB_OUTPUT"
          else
            echo "android=false" >> "$GITHUB_OUTPUT"
          fi

  build_apk:
    name: Build Android APK
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Android/src
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build
        # assembleRelease is an aggregate task — it builds all 3 shipping variants
        # (fullOpenRelease→IzzyOnDroid, fullPlaysafeRelease→Play, degoogledOpenRelease→GrapheneOS).
        # degoogledPlaysafe is filtered out (androidComponents.beforeVariants in build.gradle.kts).
        run: ./gradlew assembleRelease
      - name: Verify the degoogled flavor ships no Google-Mobile-Services classes
        # Hard gate for the flavor split: the de-Googled APK's dex must contain zero
        # com.google.android.gms / com.google.android.apps.aicore / com.google.mlkit class descriptors.
        run: |
          APK=$(find app/build/outputs/apk/degoogledOpen/release -name "*.apk" | head -1)
          echo "Scanning $APK for GMS / AICore / ML Kit classes…"
          COUNT=$(unzip -p "$APK" 'classes*.dex' | strings | grep -Ec "Lcom/google/(android/(gms|apps/aicore)|mlkit)" || true)
          echo "Found $COUNT GMS/AICore/ML Kit class descriptors (expected 0)."
          if [ "$COUNT" -ne 0 ]; then
            echo "::error::degoogled flavor leaked GMS/AICore/ML Kit classes — flavor split is broken"
            unzip -p "$APK" 'classes*.dex' | strings \
              | grep -Eo "Lcom/google/(android/(gms|apps/aicore)|mlkit)[A-Za-z0-9/]*" | sort -u | head -50
            exit 1
          fi
      - name: Verify the Play (playsafe) build drops the Play-restricted permissions
        # Hard gate for Play compliance: the playsafe APK's merged manifest must declare none of the
        # restricted permissions (a runtime BuildConfig flag wouldn't satisfy Google's manifest review).
        run: |
          APK=$(find app/build/outputs/apk/fullPlaysafe/release -name "*.apk" | head -1)
          AAPT2=$(ls "$ANDROID_HOME"/build-tools/*/aapt2 | sort -V | tail -1)
          echo "Scanning $APK permissions with $AAPT2…"
          PERMS=$("$AAPT2" dump permissions "$APK" \
            | grep -E "USE_EXACT_ALARM|SCHEDULE_EXACT_ALARM|REQUEST_IGNORE_BATTERY_OPTIMIZATIONS|READ_CALENDAR" || true)
          if [ -n "$PERMS" ]; then
            echo "::error::playsafe build still declares Play-restricted permissions — src/playsafe manifest removal is broken"
            echo "$PERMS"
            exit 1
          fi
          # aapt2 dump permissions only covers <uses-permission>; the notification-listener service +
          # triage activity are <service>/<activity> nodes, so assert their absence via the manifest tree.
          COMPONENTS=$("$AAPT2" dump xmltree --file AndroidManifest.xml "$APK" 2>/dev/null \
            | grep -E "RelaisNotificationListenerService|TriageControlActivity" || true)
          if [ -n "$COMPONENTS" ]; then
            echo "::error::playsafe build still ships a stripped component (notification listener / triage activity)"
            echo "$COMPONENTS"
            exit 1
          fi
          echo "OK — playsafe declares none of the restricted permissions and ships none of the stripped components."
      - name: Verify all shipped native libs are 16 KB-page-aligned (Pixel 10 / Android 16)
        # Pixel 10 / Android 16 use 16 KB memory pages; a bundled .so whose LOAD segments are only
        # 4 KB-aligned (p_align 0x1000) triggers a PageSizeMismatch load error. Google Play also
        # requires 16 KB support for new apps targeting Android 15+. Assert every arm64 .so in EVERY
        # shipping release variant has LOAD alignment >= 16 KB (0x4000). Catches any future transitive
        # that ships a 4 KB lib (original offender: com.google.mlkit:vision-internal-vkp's
        # libmlkitcommonpipeline.so via llmedge → image-labeling, now excluded).
        run: |
          shopt -s nullglob   # empty glob → zero iterations, NOT the literal pattern (no false green)
          BAD=0
          for variant in fullOpen/release fullPlaysafe/release degoogledOpen/release; do
            APK=$(find "app/build/outputs/apk/$variant" -name "*.apk" 2>/dev/null | head -1)
            if [ -z "$APK" ]; then
              echo "::error::$variant: no release APK found — alignment gate cannot verify"
              BAD=1; continue
            fi
            TMP=$(mktemp -d)
            unzip -q -o "$APK" 'lib/arm64-v8a/*.so' -d "$TMP" 2>/dev/null || true
            libs=("$TMP"/lib/arm64-v8a/*.so)
            # A gate that checks nothing must FAIL, not silently pass: every variant ships arm64
            # ELF libs (litert-lm at minimum), so zero extracted means the path/ABI assumption drifted.
            if [ "${#libs[@]}" -eq 0 ]; then
              echo "::error::$variant: no arm64-v8a .so extracted from $APK — gate cannot verify alignment"
              BAD=1; continue
            fi
            echo "Checking ${#libs[@]} arm64 .so in $variant…"
            for so in "${libs[@]}"; do
              # Sub-16KB alignment = 0x1000 (4K) or 0x2000 (8K) on any LOAD segment (0x4000+ is fine).
              SMALL=$(readelf -lW "$so" | awk '/LOAD/{print $NF}' | grep -E '0x(1000|2000)$' | sort -u | tr '\n' ' ' || true)
              if [ -n "$SMALL" ]; then
                echo "::error::$variant/$(basename "$so") has sub-16KB LOAD alignment: $SMALL"
                BAD=1
              fi
            done
          done
          if [ "$BAD" -ne 0 ]; then
            echo "::error::Native-lib 16 KB alignment gate failed — will fault on Pixel 10 / Android 16"
            exit 1
          fi
          echo "OK — every arm64 .so in every release variant is 16 KB-aligned."
      - name: Verify the Tensor G5 TPU dispatcher ships in every release variant
        # The TPU lane (RelaisEngine → Backend.NPU) resolves libLiteRtDispatch_GoogleTensor.so by
        # absolute path in nativeLibraryDir, so it MUST be bundled. It's a committed vendored binary
        # (src/main/jniLibs), but a stray .gitignore/packaging change could silently drop it →
        # release APKs that fall back to GPU with no error. Assert its presence in all three shipping
        # variants (incl. degoogledOpen — a self-contained accel lib, no GMS, deliberately included).
        run: |
          MISSING=0
          for variant in fullOpen/release fullPlaysafe/release degoogledOpen/release; do
            APK=$(find "app/build/outputs/apk/$variant" -name "*.apk" 2>/dev/null | head -1)
            if [ -z "$APK" ] || ! unzip -l "$APK" | grep -q "lib/arm64-v8a/libLiteRtDispatch_GoogleTensor.so"; then
              echo "::error::$variant is missing the Tensor TPU dispatcher — the TPU lane will silently fall back to GPU"
              MISSING=1
            fi
          done
          [ "$MISSING" -eq 0 ] && echo "OK — the TPU dispatcher ships in all three release variants." || exit 1
      - name: Verify the committed TPU dispatcher is the pinned, self-contained build
        # Hardening (PR #142 security review): the dex-only GMS gate above is blind to native code,
        # and nothing re-checks the committed .so's identity after fetch. Enforce, for the dispatcher
        # specifically (scoped to it — not all libs — so it can't false-positive on litertlm/litert):
        #   (a) SHA-256 == the pin in scripts/fetch-tensor-dispatcher.sh (no silent binary drift), and
        #   (b) it links no non-platform lib and imports no networking symbol (the degoogled-safe
        #       guarantee the manual review established, now enforced so a future bump can't erode it).
        run: |
          SO=app/src/main/jniLibs/arm64-v8a/libLiteRtDispatch_GoogleTensor.so
          # This step runs under the job's working-directory (Android/src); the pin script lives at repo root.
          PIN=$(grep -oE 'SHA256="[0-9a-f]{64}"' ../../scripts/fetch-tensor-dispatcher.sh | cut -d'"' -f2)
          echo "$PIN  $SO" | sha256sum -c - || { echo "::error::committed dispatcher != pinned SHA-256 (drift)"; exit 1; }
          NEEDED=$(readelf -dW "$SO" | awk -F'[][]' '/NEEDED/{print $2}')
          BAD_LINK=$(echo "$NEEDED" | grep -Ev '^(libandroid|liblog|libc|libm|libdl)\.so$' || true)
          if [ -n "$BAD_LINK" ]; then
            echo "::error::dispatcher links a non-platform lib (degoogled-unsafe): $BAD_LINK"; exit 1
          fi
          NETSYM=$(readelf -sW "$SO" | awk '$7=="UND"{print $8}' | grep -E '^(socket|connect|__connect|getaddrinfo|gethostby|send|sendto|recv|recvfrom)$' || true)
          if [ -n "$NETSYM" ]; then
            echo "::error::dispatcher imports networking symbols (should be pure HW dispatch): $NETSYM"; exit 1
          fi
          echo "OK — dispatcher matches the pin, links only platform libs, imports no networking symbols."

  unit_tests:
    name: JVM unit tests
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Android/src
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Unit tests
        # Two flavor dimensions (dist × policy) — `testDebugUnitTest` is ambiguous. Run every shipping
        # variant's debug unit tests (fullOpen / fullPlaysafe / degoogledOpen).
        run: ./gradlew testFullOpenDebugUnitTest testFullPlaysafeDebugUnitTest testDegoogledOpenDebugUnitTest
