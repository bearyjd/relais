# Branch-protection fallback for changes outside Android/**.
#
# build_android.yaml is path-filtered to Android/**, but its two job names
# ("Build Android APK", "JVM unit tests") are REQUIRED status checks on main.
# A docs/metadata-only PR therefore never produces those check runs, and an
# auto-merge deadlocks on checks stuck at "Expected" (first hit: PR #92, the
# fastlane screenshots). This twin workflow runs on the inverse filter
# (paths-ignore: Android/**) and reports the SAME check names as instant
# no-ops — GitHub's documented pattern for skipped-but-required checks.
#
# Mixed PRs (Android/** plus other files) trigger BOTH workflows: paths
# matches on any Android file, paths-ignore matches unless every changed
# file is under Android/**. Branch protection takes the LATEST check run per
# name, and the real build always finishes minutes after these no-ops, so
# the real result is the one that gates the merge.
#
# Keep the job names here byte-identical to build_android.yaml and to the
# required_status_checks contexts on main.
name: Build Android APK

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'Android/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'Android/**'

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: No-op (no Android/** changes)
        run: echo "No files under Android/** changed — required check satisfied without a build."

  unit_tests:
    name: JVM unit tests
    runs-on: ubuntu-latest
    steps:
      - name: No-op (no Android/** changes)
        run: echo "No files under Android/** changed — required check satisfied without running tests."
