[versions]
agp = "8.8.2"
kotlin = "2.2.0"
coreKtx = "1.15.0"
junit = "4.13.2"
junitVersion = "1.2.1"
espressoCore = "3.6.1"
lifecycleRuntimeKtx = "2.8.7"
activityCompose = "1.10.1"
composeBom = "2026.02.00"
navigation = "2.8.9"
serializationPlugin = "2.0.21"
serializationJson = "1.7.3"
materialIconExtended = "1.7.8"
workRuntime = "2.10.0"
dataStore = "1.1.7"
gson = "2.12.1"
lifecycleProcess = "2.8.7"
webkit = "1.14.0"
protobuf = "0.9.5"
protobufJavaLite = "4.26.1"
#noinspection GradleDependency
litertlm = "0.12.0"
sherpaOnnx = "1.13.4"
commonsCompress = "1.27.1"
commonmark = "1.0.0-alpha02"
richtext = "1.0.0-alpha02"
# Bundled (in-APK) LiteRT runtime — works WITHOUT Google Play Services (de-Googled devices). v1.x
# track keeps org.tensorflow.lite.Interpreter (implements InterpreterApi). Replaces play-services-tflite.
litert = "1.4.2"
cameraX = "1.4.2"
netOpenidAppauth = "0.11.1"
splashscreen = "1.2.0-beta01"
hilt = "2.58"
hiltNavigation = "1.3.0"
# FOSS third-party-license screen (replaces the GMS play-services-oss-licenses viewer). The Gradle
# plugin scans the real dependency graph and generates R.raw.aboutlibraries at build time; works
# identically in both flavors (no GMS). Pinned to the 11.6.x line: it tracks androidx.core 1.15.0
# (matches coreKtx above), so it's compileSdk-35 / AGP-8.8.2 compatible. The 14.x line pulls
# androidx.core 1.18.0, which hard-requires compileSdk 36 + AGP 8.9.1 (a project-wide bump).
aboutLibraries = "11.6.3"
exifinterface = "1.4.1"
securityCrypto = "1.1.0"
kotlinReflect = "2.2.21"
moshi = "1.15.2"
ksp = "2.3.6"
mlkit-genai-prompt = "1.0.0-beta2"  # Ref: https://developers.google.com/ml-kit/genai/prompt/android/get-started#configure-project
# On-device Latin OCR for share-in images (#13). NOTE: this artifact transitively pulls the
# Play-Services text-recognition pipeline (com.google.android.gms:play-services-mlkit-text-recognition
# + play-services-base/-basement/-tasks) — so OCR is NOT GMS-free. It works on GMS devices; a future
# de-Googled build flavor must exclude this dep. (Decision: OCR in the single main build for now.)
mlkit-text-recognition = "16.0.1"
mcp = "0.8.0"
ktor = "3.4.3"
robolectric = "4.14.1"  # https://github.com/robolectric/robolectric/releases/tag/robolectric-4.14.1
# Virtual-time coroutine testing (runTest/TestScope) — matches the resolved kotlinx-coroutines 1.10.x
# in the graph. Test-only; used by the shell-polling pause/resume regression (#171).
coroutinesTest = "1.10.2"
room = "2.7.1"  # KSP2-compatible line (Kotlin 2.2.0 uses KSP2); 2.6.x predates KSP2 Room support
glance = "1.1.1"  # Glance app-widget (#3); pinned to the cached version so --offline builds resolve
# On-device text-to-image (sd.cpp / Stable Diffusion via Vulkan) — feature #16, FULL FLAVOR ONLY. Its
# libsdcpp.so ships with Vulkan; the only on-device engine proven to run (MediaPipe is a protobuf dead
# end — see docs/images-generations-api.md). Transitively pulls com.google.mlkit + play-services (would
# break the degoogled GMS=0 dex gate), so it is `fullImplementation` with onnxruntime/ktor transitives
# excluded (unused image-gen-irrelevant llmedge features). JitPack-hosted (scoped repo in settings).
# Pinned to the stable 0.4.2 tag (Aatricks/llmedge V0.4.2) — was 0.4.2beta1; stabilized for the
# Play/full release per #134 (same feature version as the beta, just the released tag).
llmedge = "0.4.2"

