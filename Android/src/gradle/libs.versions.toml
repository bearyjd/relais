# On-device TTS (#168): sherpa-onnx runtime (Apache-2.0) — self-contained ONNX Runtime + espeak-ng +
# Piper/Kokoro voices; GMS-free so it ships on all flavors incl. degoogled. JitPack-hosted (scoped in
# settings). commons-compress decompresses the .tar.bz2 voice bundle at provision time (no bzip2 in the JDK).
sherpa-onnx = { group = "com.github.k2-fsa", name = "sherpa-onnx", version.ref = "sherpaOnnx" }
commons-compress = { group = "org.apache.commons", name = "commons-compress", version.ref = "commonsCompress" }

